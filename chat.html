<!DOCTYPE html>

<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>الدردشة</title>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script src="firebaseConfig.js"></script>

<style>
body {
  font-family: Tahoma;
  padding: 20px;
  background: #f5f7fb;
}

#messages {
  height: 350px;
  overflow-y: scroll;
  border: 1px solid #ddd;
  background: white;
  padding: 10px;
  border-radius: 10px;
  margin-bottom: 10px;
}

.msg {
  margin-bottom: 8px;
  padding: 6px 10px;
  background: #eef2ff;
  border-radius: 8px;
}

input {
  width: 70%;
  padding: 10px;
  border-radius: 8px;
  border: 1px solid #ccc;
}

button {
  padding: 10px 15px;
  border: none;
  border-radius: 8px;
  background: #4a6cf7;
  color: white;
  cursor: pointer;
}
</style>

</head>

<body>

<h2>الدردشة العامة</h2>

<div style="background:#fff3cd;padding:10px;border-radius:8px;margin-bottom:10px;">
⚠️ هذه المحادثة قد تخضع للمراجعة
</div>

<div id="messages"></div>

<input id="msgInput" placeholder="اكتب رسالة">
<button onclick="sendMessage()">إرسال</button>

<script>
const db = firebase.firestore();

let currentUser = null;

// 🔥 ننتظر تسجيل الدخول بشكل صحيح
firebase.auth().onAuthStateChanged(function(user) {
  if (user) {
    currentUser = user;
  } else {
    currentUser = null;
  }
});

// إرسال رسالة
function sendMessage() {
  const text = document.getElementById("msgInput").value;

  if (!text) return;

  if (!currentUser) {
    alert("انتظر لحظة... جاري تحميل الحساب");
    return;
  }

  db.collection("users").doc(currentUser.uid).get().then(function(doc) {

    let username = "مستخدم";

    if (doc.exists && doc.data().username) {
      username = doc.data().username;
    }

    db.collection("chat").add({
      text: text,
      userId: currentUser.uid,
      username: username,
      createdAt: firebase.firestore.FieldValue.serverTimestamp()
    });

  });

  document.getElementById("msgInput").value = "";
}

// عرض الرسائل
function loadMessages() {
  db.collection("chat")
    .orderBy("createdAt")
    .onSnapshot(function(snapshot) {

      const box = document.getElementById("messages");
      box.innerHTML = "";

      snapshot.forEach(function(doc) {
        const msg = doc.data();

        box.innerHTML += '<div class="msg"><b>' + (msg.username || "مستخدم") + ':</b> ' + msg.text + '</div>';
      });

      box.scrollTop = box.scrollHeight;
    });
}

loadMessages();
</script>

</body>
</html>
