<!DOCTYPE html>

<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>الدردشة</title>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script src="firebaseConfig.js"></script>

<style>
body {
  font-family: Tahoma;
  padding: 20px;
}

#messages {
  height: 300px;
  overflow-y: scroll;
  border: 1px solid #ccc;
  padding: 10px;
  margin-bottom: 10px;
}

input {
  width: 70%;
  padding: 8px;
}

button {
  padding: 8px;
}
</style>

</head>

<body>

<h2>الدردشة العامة</h2>

<div style="background:#fff3cd;padding:10px;border-radius:8px;">
⚠️ هذه المحادثة قد تخضع للمراجعة لحماية المجتمع
</div>

<br>

<div id="messages"></div>

<input id="msgInput" placeholder="اكتب رسالة">
<button onclick="sendMessage()">إرسال</button>

<script>

const db = firebase.firestore();

// إرسال رسالة
function sendMessage() {

  const text = document.getElementById("msgInput").value;

  if (!text) return;

  const user = firebase.auth().currentUser;

  if (!user) {
    alert("يجب تسجيل الدخول");
    return;
  }

  db.collection("users").doc(user.uid).get().then(function(doc) {

    var username = "مستخدم";

    if (doc.exists) {
      username = doc.data().username;
    }

    db.collection("chat").add({
      text: text,
      userId: user.uid,
      username: username,
      createdAt: firebase.firestore.FieldValue.serverTimestamp()
    });

    document.getElementById("msgInput").value = "";

  });

}


// عرض الرسائل
function loadMessages() {

  db.collection("chat")
    .orderBy("createdAt")
    .onSnapshot(function(snapshot) {

      const box = document.getElementById("messages");
      box.innerHTML = "";

      snapshot.forEach(function(doc) {

        const msg = doc.data();

        box.innerHTML += "<p><b>" + (msg.username || "مستخدم") + ":</b> " + msg.text + "</p>";

      });

      box.scrollTop = box.scrollHeight;

    });

}


// تشغيل
loadMessages();

</script>

</body>
</html>
