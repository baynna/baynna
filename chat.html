// عرض الرسائل
function loadMessages() {
  db.collection("chat")
    .orderBy("createdAt")
    .onSnapshot(snapshot => {
      const box = document.getElementById("messages");
      box.innerHTML = "";

      snapshot.forEach(doc => {
        const msg = doc.data();

        box.innerHTML += `
          <p>
            <strong>${msg.username || "مستخدم"}:</strong>
            ${msg.text}
          </p>
        `;
      });

      box.scrollTop = box.scrollHeight;
    });
}

// تشغيل
loadMessages();
</script>
