<!DOCTYPE html>

<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>الملف الشخصي</title>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

  <h2 id="usernameTitle">الملف الشخصي</h2>

<button id="followBtn"></button>

  <div id="userPosts"></div>

</div>

<script src="firebaseConfig.js"></script>

<script src="follow.js"></script>

<script>
const db = firebase.firestore();

let currentUser = null;

// انتظار تسجيل الدخول
firebase.auth().onAuthStateChanged(function(user) {
  currentUser = user;

  if (user && user.uid !== userId) {
    loadFollowButton(userId);
  }
});

// قراءة userId من الرابط
const params = new URLSearchParams(window.location.search);
const userId = params.get("uid");

// عرض المنشورات
function loadUserPosts() {
  const container = document.getElementById("userPosts");
  container.innerHTML = "";

  db.collection("posts")
    .where("userId", "==", userId)
    .orderBy("createdAt", "desc")
    .get()
    .then(function(snapshot) {

      snapshot.forEach(function(doc) {

        const post = doc.data();

        const div = document.createElement("div");
        div.className = "post";

        div.innerHTML = `
          <h3>${post.username}</h3>
          <p>${post.content || ""}</p>

          ${
            post.imageUrl
              ? `<img src="${post.imageUrl}" style="width:100%;border-radius:10px;">`
              : ""
          }
        `;

        container.appendChild(div);

      });

    });
}

// عرض اسم المستخدم
function loadUserName() {
  db.collection("users").doc(userId).get().then(function(doc) {

    if (doc.exists) {
      document.getElementById("usernameTitle").innerText =
        doc.data().username;
    }

  });
}

loadUserPosts();
loadUserName();
</script>

</body>
</html>
