<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>بيننا</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:linear-gradient(135deg,#1e3c72,#2a5298);
  font-family:Arial;
}
.box{
  background:#fff;
  padding:30px;
  border-radius:12px;
  width:300px;
  text-align:center;
  box-shadow:0 0 20px rgba(0,0,0,0.2);
}
input{
  width:100%;
  padding:10px;
  margin:8px 0;
  border-radius:6px;
  border:1px solid #ccc;
}
button{
  width:100%;
  padding:10px;
  margin:5px 0;
  border:none;
  border-radius:6px;
  background:#2a5298;
  color:#fff;
  font-size:16px;
  cursor:pointer;
}
#user{
  margin-top:10px;
  color:#333;
}
</style>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
</head>

<body>

<div class="box">
<h3>بيننا</h3>

<input id="email" placeholder="البريد">
<input id="password" type="password" placeholder="كلمة المرور">

<button onclick="register()">إنشاء حساب</button>
<button onclick="login()">دخول</button>
<button onclick="logout()">خروج</button>

<p id="user">غير مسجل</p>
</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyDenhDdt7d-7GmslPRzw88ser5Orfp63OE",
  authDomain: "baynnaa.firebaseapp.com",
  projectId: "baynnaa",
  storageBucket: "baynnaa.firebasestorage.app",
  messagingSenderId: "694347629104",
  appId: "1:694347629104:web:a752786cb26d320398e3f5",
  measurementId: "G-16D317R880"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();

function register(){
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  auth.createUserWithEmailAndPassword(email,password)
  .then(()=>{
    alert("تم إنشاء الحساب");
  })
  .catch(e=>{
    alert(e.message);
  });
}

function login(){
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  auth.signInWithEmailAndPassword(email,password)
  .then(()=>{
    alert("تم تسجيل الدخول");
  })
  .catch(e=>{
    alert(e.message);
  });
}

function logout(){
  auth.signOut();
}

auth.onAuthStateChanged(user=>{
  if(user){
    document.getElementById("user").innerText = user.email;
  }else{
    document.getElementById("user").innerText = "غير مسجل";
  }
});
</script>

</body>
</html>
