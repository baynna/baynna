<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>بيننا</title>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>

<style>
body{
font-family: Arial;
background:#f5f5f5;
text-align:center;
padding:20px;
}
.box{
background:#fff;
padding:25px;
border-radius:15px;
max-width:400px;
margin:auto;
}
input,button{
width:100%;
padding:10px;
margin:8px 0;
}
button{
background:#222;
color:#fff;
border:none;
cursor:pointer;
}
</style>
</head>

<body>

<div class="box">
<h2>بيننا</h2>

<input id="email" placeholder="البريد">
<input id="password" type="password" placeholder="كلمة المرور">

<button onclick="register()">إنشاء حساب</button>
<button onclick="login()">دخول</button>
<button onclick="logout()">خروج</button>

<p id="user">غير مسجل</p>
</div>

<script>
const firebaseConfig = {
apiKey: "AIzaSyA_pNFhFcOArArEmKLIiQ-pAlIVXdOM1T8",
authDomain: "baynna-9884f.firebaseapp.com",
projectId: "baynna-9884f"
};

firebase.initializeApp(firebaseConfig);

function register(){
firebase.auth().createUserWithEmailAndPassword(
email.value,
password.value
)
.then(()=>alert("تم إنشاء الحساب"))
.catch(e=>alert(e.message));
}

function login(){
firebase.auth().signInWithEmailAndPassword(
email.value,
password.value
)
.then(()=>alert("تم تسجيل الدخول"))
.catch(e=>alert(e.message));
}

function logout(){
firebase.auth().signOut();
}

firebase.auth().onAuthStateChanged(user=>{
if(user){
document.getElementById("user").innerText = user.email;
}else{
document.getElementById("user").innerText = "غير مسجل";
}
});
</script>

</body>
</html>
