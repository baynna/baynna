<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>بيننا</title>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<style>
body{font-family:Tahoma;background:#f5f7fb;padding:20px}
.box{max-width:700px;margin:auto;background:#fff;padding:20px;border-radius:12px}
input,textarea{width:100%;padding:10px;margin:5px 0;border-radius:8px;border:1px solid #ccc}
button{padding:10px;margin:5px;border:none;border-radius:8px;background:#2563eb;color:white}
.post{background:#eee;padding:10px;margin-top:10px;border-radius:8px}
.profile{background:#f0f0f0;padding:10px;border-radius:8px;margin-bottom:10px}
</style>
</head>

<body>

<div class="box">

<h2>بيننا</h2>

<input id="email" placeholder="البريد">
<input id="password" type="password" placeholder="كلمة المرور">

<button onclick="register()">إنشاء حساب</button>
<button onclick="login()">تسجيل الدخول</button>
<button onclick="logout()">خروج</button>

<p id="user">غير مسجل</p>

<hr>

<div id="profileBox" style="display:none;">
<div class="profile">
<input id="username" placeholder="اسم المستخدم">
<textarea id="bio" placeholder="نبذة عنك"></textarea>
<button onclick="saveProfile()">حفظ البيانات</button>
</div>
</div>

<div id="userInfo"></div>

<hr>

<textarea id="text" placeholder="اكتب منشور"></textarea>
<button onclick="sendPost()">نشر</button>

<div id="posts"></div>

</div>

<script>

const firebaseConfig = {
apiKey: "AIzaSyA_pNFhFcOArArEmKlIiQ-pAlIVXdOM1T8",
authDomain: "baynna-9884f.firebaseapp.com",
projectId: "baynna-9884f",
storageBucket: "baynna-9884f.appspot.com",
messagingSenderId: "377002437252",
appId: "1:377002437252:web:dc7f507818e8abace970d1"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();

let currentUserData = null;

function register(){
let email=document.getElementById("email").value;
let password=document.getElementById("password").value;

auth.createUserWithEmailAndPassword(email,password)
.then(user=>{
db.collection("users").doc(user.user.uid).set({
email:email,
username:"",
bio:"",
uid:user.user.uid
});
})
.catch(e=>alert(e.message));
}

function login(){
let email=document.getElementById("email").value;
let password=document.getElementById("password").value;

auth.signInWithEmailAndPassword(email,password)
.catch(e=>alert(e.message));
}

function logout(){
auth.signOut();
}

auth.onAuthStateChanged(user=>{

if(user){
document.getElementById("user").innerText=user.email;

db.collection("users").doc(user.uid).get().then(doc=>{
currentUserData=doc.data();

if(!currentUserData.username){
document.getElementById("profileBox").style.display="block";
}else{
document.getElementById("profileBox").style.display="none";
}

document.getElementById("userInfo").innerHTML=
"<b>"+(currentUserData.username||"بدون اسم")+"</b><br>"+(currentUserData.bio||"");

});

}else{
document.getElementById("user").innerText="غير مسجل";
document.getElementById("profileBox").style.display="none";
}

});

function saveProfile(){
let username=document.getElementById("username").value;
let bio=document.getElementById("bio").value;

let user=auth.currentUser;

if(!username){
alert("اكتب اسم المستخدم");
return;
}

db.collection("users").doc(user.uid).update({
username:username,
bio:bio
}).then(()=>{
alert("تم الحفظ");
location.reload();
});
}

function sendPost(){
let text=document.getElementById("text").value;
let user=auth.currentUser;

if(!user){alert("سجل الدخول");return;}

db.collection("posts").add({
text:text,
uid:user.uid,
time:Date.now()
});
}

db.collection("posts").orderBy("time","desc").onSnapshot(snap=>{
let html="";

snap.forEach(doc=>{
let d=doc.data();

html+=`
<div class="post">
${d.text}
</div>
`;
});

document.getElementById("posts").innerHTML=html;
});

</script>

</body>
</html>
