<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>بيننا</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #f5f5f5;
  text-align: center;
  padding: 20px;
}

.box {
  max-width: 500px;
  margin: auto;
  background: white;
  padding: 20px;
  border-radius: 15px;
  box-shadow: 0 5px 20px rgba(0,0,0,0.1);
}

input, textarea, select {
  width: 100%;
  padding: 12px;
  margin: 10px 0;
  border-radius: 10px;
  border: 1px solid #ddd;
}

button {
  width: 100%;
  padding: 12px;
  background: #222;
  color: white;
  border: none;
  border-radius: 10px;
  cursor: pointer;
}

button:hover {
  opacity: 0.9;
}

.post {
  background: #fff;
  padding: 10px;
  margin-top: 10px;
  border-radius: 10px;
}
</style>

</head>
<body>

<div class="box">

<h2>بيننا</h2>

<input id="email" placeholder="اكتب ايميلك">
<input id="password" type="password" placeholder="كلمة المرور">

<button onclick="login()">دخول</button>

<p id="user">غير مسجل</p>

<hr>

<h3>اكتب ما بداخلك</h3>

<select id="feeling">
  <option>مشاعري ❤️</option>
  <option>حزين</option>
  <option>سعيد</option>
  <option>متعب</option>
</select>

<textarea id="postText" placeholder="اكتب هنا..."></textarea>

<button onclick="addPost()">نشر</button>

<h3>المنشورات</h3>
<div id="posts"></div>

</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyA_pNFhFcOArArEmKLIiQ-pAlIVXdOM1T8",
  authDomain: "baynna-9884f.firebaseapp.com",
  projectId: "baynna-9884f",
  storageBucket: "baynna-9884f.appspot.com",
  messagingSenderId: "377002437252",
  appId: "1:377002437252:web:dc7f507818e8abace970d1"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();

// تسجيل دخول
function login() {
  let email = document.getElementById("email").value;
  let password = document.getElementById("password").value;

  auth.signInWithEmailAndPassword(email, password)
  .then(() => {
    document.getElementById("user").innerText = "تم تسجيل الدخول ✅";
  })
  .catch(() => {
    auth.createUserWithEmailAndPassword(email, password);
  });
}

// إضافة منشور
function addPost() {
  let text = document.getElementById("postText").value;
  let feeling = document.getElementById("feeling").value;

  db.collection("posts").add({
    text: text,
    feeling: feeling,
    time: new Date()
  });

  document.getElementById("postText").value = "";
}

// عرض المنشورات
db.collection("posts").orderBy("time","desc")
.onSnapshot(snapshot => {
  let postsDiv = document.getElementById("posts");
  postsDiv.innerHTML = "";

  snapshot.forEach(doc => {
    let data = doc.data();
    postsDiv.innerHTML += `
      <div class="post">
        <b>${data.feeling}</b>
        <p>${data.text}</p>
      </div>
    `;
  });
});
</script>

</body>
</html>
