<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>بيننا</title>

  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

  <style>
    body {
      font-family: Tahoma, Arial, sans-serif;
      background: #f5f7fb;
      margin: 0;
      padding: 20px;
    }

    .box {
      max-width: 700px;
      margin: 0 auto;
      background: #fff;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 0 10px rgba(0,0,0,0.08);
    }

    h2 {
      margin: 0 0 15px 0;
    }

    .row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 12px;
    }

    input {
      flex: 1;
      min-width: 220px;
      padding: 10px;
      font-size: 16px;
      border: 1px solid #ccc;
      border-radius: 8px;
    }

    button {
      padding: 10px 16px;
      border: none;
      border-radius: 8px;
      background: #2563eb;
      color: white;
      cursor: pointer;
    }

    button:hover {
      background: #1d4ed8;
    }

    .delete-btn {
      background: #dc2626;
      margin-top: 8px;
    }

    .delete-btn:hover {
      background: #b91c1c;
    }

    .muted {
      color: #666;
      font-size: 14px;
      margin-bottom: 15px;
    }

    .post {
      background: #eee;
      padding: 12px;
      margin-bottom: 10px;
      border-radius: 8px;
    }

    .post-name {
      font-weight: bold;
      margin-bottom: 6px;
    }

    .post-time {
      color: #666;
      font-size: 12px;
      margin-top: 6px;
    }

    #authBox {
      margin-bottom: 20px;
      padding-bottom: 15px;
      border-bottom: 1px solid #ddd;
    }
  </style>
</head>
<body>

  <div class="box">
    <h2>بيننا</h2>

    <div id="authBox">
      <div class="row">
        <input id="email" type="email" placeholder="البريد الإلكتروني">
        <input id="password" type="password" placeholder="كلمة المرور">
      </div>

      <div class="row">
        <button onclick="register()">إنشاء حساب</button>
        <button onclick="login()">تسجيل الدخول</button>
        <button onclick="logout()">خروج</button>
      </div>

      <p id="user" class="muted">غير مسجل</p>
    </div>

    <div class="row">
      <input id="text" placeholder="اكتب منشور">
      <button onclick="sendPost()">نشر</button>
    </div>

    <div id="posts"></div>
  </div>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyA_pNFhFcOArArEmKLIiQ-pAlIVXdOM1T8",
      authDomain: "baynna-9884f.firebaseapp.com",
      projectId: "baynna-9884f",
      storageBucket: "baynna-9884f.appspot.com",
      messagingSenderId: "377002437252",
      appId: "1:377002437252:web:dc7f507818e8abace970d1",
      measurementId: "G-BLH1DN1XEL"
    };

    firebase.initializeApp(firebaseConfig);

    const auth = firebase.auth();
    const db = firebase.firestore();

    function register() {
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value.trim();

      if (!email || !password) {
        alert("اكتب البريد وكلمة المرور");
        return;
      }

      auth.createUserWithEmailAndPassword(email, password)
        .then(() => {
          alert("تم إنشاء الحساب");
        })
        .catch((error) => {
          alert(error.message);
        });
    }

    function login() {
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value.trim();

      if (!email || !password) {
        alert("اكتب البريد وكلمة المرور");
        return;
      }

      auth.signInWithEmailAndPassword(email, password)
        .catch((error) => {
          alert(error.message);
        });
    }

    function logout() {
      auth.signOut().catch((error) => {
        alert(error.message);
      });
    }

    auth.onAuthStateChanged((user) => {
      if (user) {
        document.getElementById("user").innerText = "مسجل: " + user.email;
      } else {
        document.getElementById("user").innerText = "غير مسجل";
      }
    });

    function sendPost() {
      const text = document.getElementById("text").value.trim();
      const user = auth.currentUser;

      if (!user) {
        alert("سجل الدخول أولاً");
        return;
      }

      if (!text) return;

      db.collection("posts").add({
        text: text,
        name: user.email,
        uid: user.uid,
        time: Date.now()
      })
      .then(() => {
        document.getElementById("text").value = "";
      })
      .catch((error) => {
        alert(error.message);
      });
    }

    function deletePost(id) {
      db.collection("posts").doc(id).delete()
        .catch((error) => {
          alert(error.message);
        });
    }

    db.collection("posts")
      .orderBy("time", "desc")
      .onSnapshot((snapshot) => {
        let html = "";
        const currentUser = auth.currentUser;

        snapshot.forEach((doc) => {
          const data = doc.data();

          let postTime = "";
          if (data.time) {
            postTime = new Date(data.time).toLocaleString();
          }

          let deleteButton = "";
          if (currentUser && currentUser.uid === data.uid) {
            deleteButton = "<button class='delete-btn' onclick=\"deletePost('" + doc.id + "')\">حذف</button>";
          }

          html +=
            "<div class='post'>" +
              "<div class='post-name'>" + (data.name || "مستخدم") + "</div>" +
              "<div>" + (data.text || "") + "</div>" +
              "<div class='post-time'>" + postTime + "</div>" +
              deleteButton +
            "</div>";
        });

        document.getElementById("posts").innerHTML = html;
      }, (error) => {
        alert(error.message);
      });
  </script>

</body>
</html>
