<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>baynna</title>

  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

  <style>
    body {
      font-family: Tahoma, Arial, sans-serif;
      background: #f5f7fb;
      margin: 0;
      padding: 20px;
    }

    h2 {
      margin: 0 0 15px 0;
    }

    .box {
      max-width: 700px;
      margin: 0 auto;
      background: #fff;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.08);
    }

    .row {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
    }

    input {
      flex: 1;
      padding: 10px;
      font-size: 16px;
    }

    button {
      padding: 10px 16px;
      cursor: pointer;
    }

    #posts {
      margin-top: 20px;
    }

    .post {
      background: #eee;
      padding: 12px;
      margin-bottom: 10px;
      border-radius: 8px;
      text-align: right;
    }
  </style>
</head>
<body>
  <div class="box">
    <h2>اكتب منشور</h2>

    <div class="row">
      <input id="story" type="text" />
      <button onclick="add()">إضافة</button>
    </div>

    <div id="posts"></div>
  </div>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyA_pNFhFcOArArEmK1IiQ-pAlIVXdOM1T8",
      authDomain: "baynna-9884f.firebaseapp.com",
      projectId: "baynna-9884f",
      storageBucket: "baynna-9884f.appspot.com",
      messagingSenderId: "377002437252",
      appId: "1:377002437252:web:dc7f507818e8abace970d1",
      measurementId: "G-BLH1DN1XEL"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    function showPost(text) {
      let div = document.createElement("div");
      div.className = "post";
      div.innerText = text;
      document.getElementById("posts").appendChild(div);
    }

    function loadPosts() {
      document.getElementById("posts").innerHTML = "";

      db.collection("stories").get().then((snapshot) => {
        snapshot.forEach((doc) => {
          const data = doc.data();
          if (data.text) {
            showPost(data.text);
          }
        });
      });
    }

    function add() {
      let text = document.getElementById("story").value;

      if (text === "") return;

      db.collection("stories").add({
        text: text,
        time: new Date()
      }).then(() => {
        document.getElementById("story").value = "";
        loadPosts();
      });
    }

    loadPosts();
  </script>
</body>
</html>
