<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>بيننا</title>

<style>
body {
  font-family: Arial;
  background: #f5f5f5;
  text-align: center;
  padding: 20px;
}

.box {
  max-width: 500px;
  margin: auto;
  background: #fff;
  padding: 20px;
  border-radius: 15px;
  box-shadow: 0 0 10px rgba(0,0,0,0.1);
}

input, textarea {
  width: 90%;
  padding: 10px;
  margin: 5px;
  border-radius: 8px;
  border: 1px solid #ccc;
}

button {
  width: 95%;
  padding: 10px;
  margin: 5px;
  border: none;
  background: #222;
  color: #fff;
  border-radius: 8px;
  cursor: pointer;
}

.post {
  background: #eee;
  padding: 10px;
  margin: 10px;
  border-radius: 10px;
}
</style>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

</head>

<body>

<div class="box">
<h2>بيننا</h2>

<input id="email" placeholder="البريد">
<input id="password" type="password" placeholder="كلمة المرور">

<button onclick="register()">إنشاء حساب</button>
<button onclick="login()">دخول</button>
<button onclick="logout()">خروج</button>

<p id="user">غير مسجل</p>

<hr>

<textarea id="postText" placeholder="اكتب هنا..."></textarea>
<button onclick="addPost()">نشر</button>

<div id="posts"></div>
</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyA_pNFhFcOArArEmKLIiQ-pAlIVXdOM1T8",
  authDomain: "baynna-9884f.firebaseapp.com",
  projectId: "baynna-9884f",
  storageBucket: "baynna-9884f.appspot.com",
  messagingSenderId: "377002437252",
  appId: "1:377002437252:web:dc7f507818e8abace970d1"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();

function register() {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  auth.createUserWithEmailAndPassword(email, password);
}

function login() {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  auth.signInWithEmailAndPassword(email, password);
}

function logout() {
  auth.signOut();
}

auth.onAuthStateChanged(user => {
  if (user) {
    document.getElementById("user").innerText = user.email;
  } else {
    document.getElementById("user").innerText = "غير مسجل";
  }
});

function addPost() {
  const text = document.getElementById("postText").value;

  if (text === "") return;

  db.collection("posts").add({
    text: text,
    time: new Date()
  });

  document.getElementById("postText").value = "";
}

function loadPosts() {
  db.collection("posts")
    .orderBy("time", "desc")
    .onSnapshot(snapshot => {
      const postsDiv = document.getElementById("posts");
      postsDiv.innerHTML = "";

      snapshot.forEach(doc => {
        const data = doc.data();

        postsDiv.innerHTML += `
          <div class="post">
            ${data.text}
          </div>
        `;
      });
    });
}

loadPosts();
</script>

</body>
</html>
