<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>بيننا</title>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<style>
body{
font-family:Arial;
background:linear-gradient(135deg,#0f172a,#1e3a8a);
margin:0;
padding:20px;
}
.box{
background:white;
padding:20px;
border-radius:15px;
width:350px;
margin:auto;
margin-bottom:20px;
}
input,textarea,button{
width:100%;
margin:5px 0;
padding:10px;
border-radius:8px;
border:1px solid #ccc;
}
button{
background:#1e3a8a;
color:white;
border:none;
}
.post{
background:white;
padding:15px;
margin:10px auto;
width:350px;
border-radius:10px;
}
img{
width:100%;
border-radius:10px;
}
</style>
</head>

<body>

<div class="box">
<h3>بيننا</h3>

<input id="email" placeholder="البريد">
<input id="password" type="password" placeholder="كلمة المرور">

<button onclick="register()">إنشاء حساب</button>
<button onclick="login()">دخول</button>
<button onclick="logout()">خروج</button>

<p id="user">غير مسجل</p>

<textarea id="postText" placeholder="اكتب منشور"></textarea>
<input type="file" id="imageInput">

<button onclick="addPost()">نشر</button>
</div>

<div id="posts"></div>

<script>

const firebaseConfig = {
apiKey: "AIzaSyDenhDdt7d-7GmslPRzw88ser5Orfp63OE",
authDomain: "baynnaa.firebaseapp.com",
projectId: "baynnaa",
storageBucket: "baynnaa.firebasestorage.app",
messagingSenderId: "694347629104",
appId: "1:694347629104:web:a752786cb26d320398e3f5"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();

let imageBase64="";

document.getElementById("imageInput").onchange=function(e){
const file=e.target.files[0];
const reader=new FileReader();
reader.onload=function(){
imageBase64=reader.result;
}
reader.readAsDataURL(file);
}

function register(){
let e=email.value;
let p=password.value;
auth.createUserWithEmailAndPassword(e,p);
}

function login(){
let e=email.value;
let p=password.value;
auth.signInWithEmailAndPassword(e,p);
}

function logout(){
auth.signOut();
}

auth.onAuthStateChanged(user=>{
if(user){
document.getElementById("user").innerText=user.email;
}else{
document.getElementById("user").innerText="غير مسجل";
}
});

function addPost(){
let user=auth.currentUser;

db.collection("posts").add({
text:postText.value,
image:imageBase64,
user:user.email,
likes:[],
comments:[],
time:new Date()
});

postText.value="";
imageBase64="";
}

function likePost(id){
let user=auth.currentUser;

db.collection("posts").doc(id).get().then(doc=>{
let data=doc.data();
let likes=data.likes||[];

if(!likes.includes(user.uid)){
likes.push(user.uid);

db.collection("posts").doc(id).update({
likes:likes
});
}
});
}

function commentPost(id){
let txt=document.getElementById("c"+id).value;
let user=auth.currentUser;

db.collection("posts").doc(id).update({
comments:firebase.firestore.FieldValue.arrayUnion({
text:txt,
user:user.email
})
});
}

db.collection("posts").orderBy("time","desc")
.onSnapshot(snap=>{

let html="";

snap.forEach(doc=>{
let p=doc.data();

html+=`
<div class="post">
<b>${p.user}</b><br><br>

${p.text}<br><br>

${p.image ? `<img src="${p.image}">` : ""}

<br><br>

❤️ ${p.likes ? p.likes.length : 0}

<button onclick="likePost('${doc.id}')">لايك</button>

<br><br>

<input id="c${doc.id}" placeholder="تعليق">
<button onclick="commentPost('${doc.id}')">إرسال</button>

<br>

${p.comments ? p.comments.map(c=>`<p><b>${c.user}</b>: ${c.text}</p>`).join("") : ""}

</div>
`;
});

posts.innerHTML=html;

});

</script>

</body>
</html>
