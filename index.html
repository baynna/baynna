<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>بيننا</title>

<style>

body{
font-family:Tahoma;
background:#f5f7fb;
margin:0;
}

.container{
max-width:700px;
margin:40px auto;
background:white;
padding:20px;
border-radius:12px;
box-shadow:0 0 10px #ccc;
}

textarea{
width:100%;
height:120px;
padding:10px;
}

button{
background:blue;
color:white;
padding:10px;
border:none;
margin-top:10px;
cursor:pointer;
}

.post{
background:#eee;
padding:10px;
margin-top:10px;
border-radius:8px;
}

</style>

</head>

<body>

<div class="container">

<h1>من يفهمك كما أنت</h1>

<p>اكتب ما في قلبك… هنا لن يحكم عليك أحد</p>

<textarea id="story"></textarea>

<br>

<button onclick="add()">نشر</button>

<hr>

<div id="posts"></div>

</div>

<script>

function add(){

let text=document.getElementById("story").value;

if(text=="") return;

let div=document.createElement("div");

div.className="post";

div.innerText=text;

document.getElementById("posts").appendChild(div);

document.getElementById("story").value="";

}

</script>

</body>
</html>
