<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>بيننا</title>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<style>
body {
  font-family: Arial;
  background: linear-gradient(135deg, #0f172a, #1e293b);
  color: white;
  text-align: center;
}

.box {
  background: white;
  color: black;
  padding: 20px;
  border-radius: 15px;
  width: 320px;
  margin: 50px auto;
}

input, textarea {
  width: 90%;
  padding: 10px;
  margin: 10px;
}

button {
  width: 90%;
  padding: 12px;
  margin: 5px;
  background: black;
  color: white;
  border: none;
  cursor: pointer;
}
</style>

</head>
<body>

<div class="box">

<h2>بيننا</h2>

<input id="email" placeholder="البريد"><br>
<input id="password" type="password" placeholder="كلمة المرور"><br>

<button onclick="register()">إنشاء حساب</button>
<button onclick="login()">دخول</button>
<button onclick="logout()">خروج</button>

<p id="user">غير مسجل</p>

<hr>

<textarea id="postText" placeholder="اكتب هنا..."></textarea>
<button onclick="addPost()">نشر</button>

<div id="posts"></div>

</div>

<script>

const firebaseConfig = {
  apiKey: "AIzaSyA_pNFhFcOArArEmKLIiQ-pAlIVXdOM1T8",
  authDomain: "baynna-9884f.firebaseapp.com",
  projectId: "baynna-9884f"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

function register() {
  auth.createUserWithEmailAndPassword(email.value, password.value)
  .then(() => alert("تم إنشاء الحساب"))
  .catch(e => alert(e.message));
}

function login() {
  auth.signInWithEmailAndPassword(email.value, password.value)
  .then(() => alert("تم تسجيل الدخول"))
  .catch(e => alert(e.message));
}

function logout() {
  auth.signOut();
}

auth.onAuthStateChanged(user => {
  if (user) {
    document.getElementById("user").innerText = user.email;
    loadPosts();
  } else {
    document.getElementById("user").innerText = "غير مسجل";
  }
});

function addPost() {
  if (!auth.currentUser) return alert("سجل دخول");

  db.collection("posts").add({
    text: postText.value,
    user: auth.currentUser.email
  });

  postText.value = "";
}

function loadPosts() {
  db.collection("posts").onSnapshot(snapshot => {
    posts.innerHTML = "";

    snapshot.forEach(doc => {
      let p = doc.data();
      posts.innerHTML += `<p><b>${p.user}</b>: ${p.text}</p>`;
    });
  });
}

</script>

</body>
</html>
