<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>بيننا</title>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<style>
body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#0f172a,#1e3a8a);
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
padding:20px;
box-sizing:border-box;
}

.box{
background:#fff;
padding:20px;
border-radius:12px;
width:320px;
text-align:center;
box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

input,textarea{
width:100%;
padding:10px;
margin:8px 0;
border:1px solid #ccc;
border-radius:6px;
box-sizing:border-box;
font-family:Arial;
}

button{
width:100%;
padding:10px;
margin:5px 0;
background:#1e3a8a;
color:#fff;
border:none;
border-radius:6px;
cursor:pointer;
font-size:15px;
}

button:hover{
background:#162c66;
}

#msg{
margin-top:10px;
font-size:14px;
color:#333;
word-break:break-word;
}

#posts{
margin-top:15px;
text-align:right;
max-height:250px;
overflow:auto;
border-top:1px solid #ddd;
padding-top:10px;
}

.post{
background:#f3f4f6;
padding:10px;
border-radius:8px;
margin-bottom:8px;
}
</style>

</head>
<body>

<div class="box">
<h2>بيننا</h2>

<input id="email" placeholder="البريد">
<input id="password" type="password" placeholder="كلمة المرور">

<button onclick="register()">إنشاء حساب</button>
<button onclick="login()">دخول</button>
<button onclick="logout()">خروج</button>

<p id="msg">...</p>

<hr>

<textarea id="postText" placeholder="اكتب هنا..."></textarea>
<button onclick="addPost()">نشر</button>

<div id="posts"></div>
</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyDenhDdt7d-7GmslPRzw88ser5Orfp63OE",
  authDomain: "baynnaa.firebaseapp.com",
  projectId: "baynnaa",
  storageBucket: "baynnaa.firebasestorage.app",
  messagingSenderId: "694347629104",
  appId: "1:694347629104:web:a752786cb26d320398e3f5",
  measurementId: "G-16D317R880"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

function register(){
let e = email.value;
let p = password.value;

auth.createUserWithEmailAndPassword(e,p)
.then(()=>msg.innerText="تم إنشاء الحساب")
.catch(err=>msg.innerText=err.message);
}

function login(){
let e = email.value;
let p = password.value;

auth.signInWithEmailAndPassword(e,p)
.then(()=>msg.innerText="تم الدخول بنجاح")
.catch(err=>msg.innerText=err.message);
}

function logout(){
auth.signOut()
.then(()=>msg.innerText="تم تسجيل الخروج");
}

auth.onAuthStateChanged(user=>{
if(user){
msg.innerText="مرحباً " + user.email;
loadPosts();
}else{
msg.innerText="غير مسجل";
posts.innerHTML="";
}
});

function addPost(){
if(!auth.currentUser){
msg.innerText="سجل دخول أولاً";
return;
}

if(!postText.value.trim()){
msg.innerText="اكتب منشوراً أولاً";
return;
}

db.collection("posts").add({
text: postText.value,
user: auth.currentUser.email,
time: Date.now()
})
.then(()=>{
postText.value="";
msg.innerText="تم نشر المنشور";
})
.catch(err=>msg.innerText=err.message);
}

function loadPosts(){
db.collection("posts")
.orderBy("time","desc")
.onSnapshot(snapshot=>{
let html="";
snapshot.forEach(doc=>{
let p = doc.data();
html += "<div class='post'><b>"+p.user+"</b><br>"+p.text+"</div>";
});
posts.innerHTML = html;
});
}
</script>

</body>
</html>
