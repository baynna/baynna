<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>بيننا</title>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<style>

body{
  margin:0;
  font-family:Tahoma;
  background:#eef2f7;
}

/* شريط علوي */
.header{
  background:#2563eb;
  color:white;
  padding:15px;
  text-align:center;
  font-size:20px;
  font-weight:bold;
}

/* الصندوق */
.container{
  max-width:700px;
  margin:20px auto;
  background:white;
  padding:15px;
  border-radius:12px;
  box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

/* إدخالات */
input, textarea{
  width:100%;
  padding:10px;
  margin-top:8px;
  border-radius:8px;
  border:1px solid #ccc;
  font-family:inherit;
}

/* أزرار */
button{
  padding:10px;
  margin-top:8px;
  border:none;
  border-radius:8px;
  cursor:pointer;
}

/* ألوان */
.blue{background:#2563eb;color:white;}
.red{background:#dc2626;color:white;}
.yellow{background:#f59e0b;color:white;}
.green{background:#059669;color:white;}
.gray{background:#6b7280;color:white;}

/* منشور */
.post{
  background:#f9fafb;
  padding:12px;
  margin-top:15px;
  border-radius:10px;
  border:1px solid #e5e7eb;
}

/* اسم */
.name{
  font-weight:bold;
}

/* وقت */
.time{
  font-size:12px;
  color:#666;
}

/* لايك */
.like{
  margin-top:10px;
  font-size:14px;
}

/* تعليقات */
.commentBox{
  margin-top:10px;
  border-top:1px solid #ddd;
  padding-top:10px;
}

.comment{
  background:white;
  padding:8px;
  margin-top:5px;
  border-radius:6px;
  border:1px solid #ddd;
}

</style>
</head>

<body>

<div class="header">بيننا</div>

<div class="container">

<input id="email" placeholder="البريد الإلكتروني">
<input id="password" type="password" placeholder="كلمة المرور">

<button class="blue" onclick="register()">إنشاء حساب</button>
<button class="blue" onclick="login()">تسجيل الدخول</button>
<button class="gray" onclick="logout()">خروج</button>

<p id="user">غير مسجل</p>

<hr>

<textarea id="text" placeholder="اكتب منشور"></textarea>
<button class="blue" onclick="sendPost()">نشر</button>

<div id="posts"></div>

</div>

<script>

const firebaseConfig = {
apiKey: "AIzaSyA_pNFhFcOArArEmKlIiQ-pAlIVXdOM1T8",
authDomain: "baynna-9884f.firebaseapp.com",
projectId: "baynna-9884f",
storageBucket: "baynna-9884f.firebasestorage.app",
messagingSenderId: "377002437252",
appId: "1:377002437252:web:dc7f507818e8abace970d1",
measurementId: "G-BLH1DN1XEL"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();

function register(){
let email=emailEl.value;
let pass=passEl.value;

auth.createUserWithEmailAndPassword(email,pass)
.catch(e=>alert(e.message));
}

function login(){
let email=emailEl.value;
let pass=passEl.value;

auth.signInWithEmailAndPassword(email,pass)
.catch(e=>alert(e.message));
}

function logout(){
auth.signOut();
}

let emailEl=document.getElementById("email");
let passEl=document.getElementById("password");

auth.onAuthStateChanged(user=>{
document.getElementById("user").innerText=user?user.email:"غير مسجل";
});

function sendPost(){
let text=document.getElementById("text").value;
let user=auth.currentUser;

if(!user){alert("سجل الدخول");return;}

db.collection("posts").add({
text:text,
name:user.email,
uid:user.uid,
time:Date.now(),
likes:[]
});
}

function likePost(id,liked){
let user=auth.currentUser;
if(!user){alert("سجل الدخول");return;}

let ref=db.collection("posts").doc(id);

if(liked){
ref.update({likes:firebase.firestore.FieldValue.arrayRemove(user.uid)});
}else{
ref.update({likes:firebase.firestore.FieldValue.arrayUnion(user.uid)});
}
}

function deletePost(id){
let ok=confirm("حذف المنشور؟");
if(!ok)return;
db.collection("posts").doc(id).delete();
}

function addComment(id){
let input=document.getElementById("c-"+id);
let text=input.value;
let user=auth.currentUser;

if(!user){alert("سجل الدخول");return;}

db.collection("posts").doc(id).collection("comments").add({
text:text,
name:user.email,
uid:user.uid,
time:Date.now()
});

input.value="";
}

function deleteComment(postId,comId){
db.collection("posts").doc(postId).collection("comments").doc(comId).delete();
}

db.collection("posts").orderBy("time","desc").onSnapshot(snap=>{
let html="";

snap.forEach(doc=>{
let d=doc.data();
let user=auth.currentUser;

let liked=user?d.likes.includes(user.uid):false;

html+=`
<div class="post">

<div class="name">${d.name}</div>
<div class="time">${new Date(d.time).toLocaleString()}</div>

<div>${d.text}</div>

<div class="like">
<button class="blue" onclick="likePost('${doc.id}',${liked})">
${liked?"إلغاء اللايك":"لايك"}
</button>
عدد اللايكات: ${d.likes.length}
</div>

<button class="red" onclick="deletePost('${doc.id}')">حذف</button>

<div class="commentBox">
<input id="c-${doc.id}" placeholder="اكتب تعليق">
<button class="green" onclick="addComment('${doc.id}')">إرسال التعليق</button>

<div id="comments-${doc.id}"></div>
</div>

</div>
`;

db.collection("posts").doc(doc.id)
.collection("comments")
.orderBy("time","desc")
.onSnapshot(s=>{

let chtml="";

s.forEach(c=>{
let cd=c.data();

chtml+=`
<div class="comment">
${cd.name}: ${cd.text}
<br>
<button class="red" onclick="deleteComment('${doc.id}','${c.id}')">حذف</button>
</div>
`;
});

document.getElementById("comments-"+doc.id).innerHTML=chtml;

});

});

document.getElementById("posts").innerHTML=html;

});

</script>

</body>
</html>
