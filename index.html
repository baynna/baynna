<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>نسخ الكود بسهولة</title>

<style>
body{
font-family:Arial;
background:#eef3f7;
text-align:center;
padding:40px;
}

.box{
max-width:600px;
margin:auto;
background:#fff;
padding:20px;
border-radius:15px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

textarea{
width:100%;
height:200px;
padding:10px;
border-radius:10px;
border:1px solid #ccc;
}

button{
margin-top:10px;
padding:12px;
width:100%;
background:#222;
color:#fff;
border:none;
border-radius:10px;
cursor:pointer;
font-size:16px;
}
</style>

</head>

<body>

<div class="box">
<h2>انسخ الكود بضغطة واحدة</h2>

<textarea id="code">
console.log("هذا مثال كود ينسخ مباشرة");
</textarea>

<button onclick="copyCode()">📋 نسخ الكود</button>

</div>

<script>
function copyCode(){
let text = document.getElementById("code");
text.select();
document.execCommand("copy");
alert("تم النسخ ✔");
}
</script>

</body>
</html>
