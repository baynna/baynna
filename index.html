<!DOCTYPE html>
<html>
<head>
<title>من يفهمك كما أنت</title>
</head>

<body>

<h1>من يفهمك كما أنت</h1>

<p>
اكتب ما في قلبك… هنا لن يحكم عليك أحد
</p>

<hr>

<h3>اكتب قصتك هنا</h3>

<textarea id="story" rows="10" cols="50"></textarea>

<br><br>

<button onclick="publish()">نشر القصة</button>

<hr>

<h3>القصص المنشورة</h3>

<div id="posts"></div>

<script>

function publish() {

var text = document.getElementById("story").value;

var post = document.createElement("p");

post.innerText = text;

document.getElementById("posts").appendChild(post);

}

</script>

</body>
</html>
