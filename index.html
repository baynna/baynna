<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>بيننا</title>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>

</head>
<body style="text-align:center;">

<h2>بيننا</h2>

<input id="email" placeholder="البريد">
<br><br>

<input id="password" type="password" placeholder="كلمة المرور">
<br><br>

<button onclick="register()">إنشاء حساب</button>
<button onclick="login()">تسجيل دخول</button>
<button onclick="logout()">خروج</button>

<p id="user">غير مسجل</p>

<script>

const firebaseConfig = {
  apiKey: "AIzaSyEndhDdt7d-7GmsLPRzw88ser50rfp630E",
  authDomain: "baynnaa.firebaseapp.com",
  projectId: "baynnaa",
  storageBucket: "baynnaa.firebasestorage.app",
  messagingSenderId: "694347629104",
  appId: "1:694347629104:web:5e730f7682ac3ab698e3f5",
  measurementId: "G-GC1EKMV23Y"
};

firebase.initializeApp(firebaseConfig);

// إنشاء حساب
function register() {
  var email = document.getElementById("email").value;
  var password = document.getElementById("password").value;

  firebase.auth().createUserWithEmailAndPassword(email, password)
  .then(() => alert("تم إنشاء الحساب"))
  .catch(error => alert(error.message));
}

// تسجيل دخول
function login() {
  var email = document.getElementById("email").value;
  var password = document.getElementById("password").value;

  firebase.auth().signInWithEmailAndPassword(email, password)
  .then(() => alert("تم تسجيل الدخول"))
  .catch(error => alert(error.message));
}

// تسجيل خروج
function logout() {
  firebase.auth().signOut();
}

// عرض المستخدم
firebase.auth().onAuthStateChanged(user => {
  if (user) {
    document.getElementById("user").innerText = "مرحباً " + user.email;
  } else {
    document.getElementById("user").innerText = "غير مسجل";
  }
});

</script>

</body>
</html>
