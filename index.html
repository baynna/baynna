<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>بيننا</title>

  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

  <style>
    body{
      font-family: Arial;
      background:#f5f5f5;
      padding:20px;
    }

    .box{
      max-width:600px;
      margin:auto;
      background:white;
      padding:20px;
      border-radius:10px;
    }

    input{
      padding:10px;
      margin:5px;
      width:45%;
    }

    button{
      padding:10px;
      margin:5px;
    }

    .post{
      background:#eee;
      padding:10px;
      margin-top:10px;
    }

  </style>
</head>
<body>

<div class="box">

<h2>بيننا</h2>

<input id="email" placeholder="البريد">
<input id="password" placeholder="كلمة المرور">

<br>

<button onclick="register()">إنشاء حساب</button>
<button onclick="login()">تسجيل الدخول</button>
<button onclick="logout()">خروج</button>

<p id="user">غير مسجل</p>

<hr>

<input id="text" placeholder="اكتب منشور">
<button onclick="sendPost()">نشر</button>

<div id="posts"></div>

</div>

<script>

const firebaseConfig = {
  apiKey: "AIzaSyA_pNFhFcOArArEmKLIiQ-pAlIVXdOM1T8",
  authDomain: "baynna-9884f.firebaseapp.com",
  projectId: "baynna-9884f",
  storageBucket: "baynna-9884f.appspot.com",
  messagingSenderId: "377002437252",
  appId: "1:377002437252:web:dc7f507818e8abace970d1",
  measurementId: "G-BLHD1NIXEL"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();


function register(){

let email=document.getElementById("email").value;
let password=document.getElementById("password").value;

auth.createUserWithEmailAndPassword(email,password)
.catch(e=>alert(e.message));

}


function login(){

let email=document.getElementById("email").value;
let password=document.getElementById("password").value;

auth.signInWithEmailAndPassword(email,password)
.catch(e=>alert(e.message));

}


function logout(){

auth.signOut();

}


auth.onAuthStateChanged(user=>{

if(user){

document.getElementById("user").innerText=user.email;

}else{

document.getElementById("user").innerText="غير مسجل";

}

});


function sendPost(){

let text=document.getElementById("text").value;
let user=auth.currentUser;

if(!user){

alert("سجل الدخول");

return;

}

db.collection("posts").add({

text:text,
name:user.email,
time:Date.now()

});

}


db.collection("posts")
.orderBy("time","desc")
.onSnapshot(snap=>{

let html="";

snap.forEach(doc=>{

let d=doc.data();

html+=`
<div class="post">
<b>${d.name}</b><br>
${d.text}
</div>
`;

});

document.getElementById("posts").innerHTML=html;

});

</script>

</body>
</html>
