<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>بيننا</title>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>

<style>
body {
    font-family: Arial;
    background: #f5f5f5;
    text-align: center;
}

.box {
    max-width: 400px;
    margin: auto;
    background: white;
    padding: 20px;
    border-radius: 15px;
}

input, button {
    width: 90%;
    padding: 10px;
    margin: 10px;
}

button {
    background: black;
    color: white;
    border: none;
    border-radius: 8px;
}
</style>
</head>

<body>

<div class="box">
<h2>بيننا</h2>

<input id="email" placeholder="البريد"><br>
<input id="password" type="password" placeholder="كلمة المرور"><br>

<button onclick="register()">إنشاء حساب</button>
<button onclick="login()">دخول</button>
<button onclick="logout()">خروج</button>

<p id="user">غير مسجل</p>
</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyA_pNFhFcOArArEmKLIiQ-pAlIVXdOM1T8",
  authDomain: "baynna-9884f.firebaseapp.com",
  projectId: "baynna-9884f",
  storageBucket: "baynna-9884f.appspot.com",
  messagingSenderId: "377002437252",
  appId: "1:377002437252:web:dc7f507818e8abace970d1",
  measurementId: "G-BLH1DN1XEL"
};

firebase.initializeApp(firebaseConfig);

function register() {
let email = document.getElementById("email").value;
let password = document.getElementById("password").value;

firebase.auth().createUserWithEmailAndPassword(email, password)
.then(() => alert("تم إنشاء الحساب"))
.catch(e => alert(e.message));
}

function login() {
let email = document.getElementById("email").value;
let password = document.getElementById("password").value;

firebase.auth().signInWithEmailAndPassword(email, password)
.then(() => alert("تم تسجيل الدخول"))
.catch(e => alert(e.message));
}

function logout() {
firebase.auth().signOut();
}

firebase.auth().onAuthStateChanged(user => {
if(user){
document.getElementById("user").innerText = "مرحبا " + user.email;
}else{
document.getElementById("user").innerText = "غير مسجل";
}
});
</script>

</body>
</html>
