<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>بيننا</title>

  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

  <style>
    body { font-family: Tahoma, Arial, sans-serif; background: #f5f7fb; margin: 0; padding: 20px; }
    .box { max-width: 700px; margin: 0 auto; background: #fff; padding: 20px; border-radius: 12px; box-shadow: 0 0 10px rgba(0,0,0,0.08); }
    h2 { margin: 0 0 15px 0; }
    .top { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; margin-bottom: 15px; }
    input { width: 100%; max-width: 320px; padding: 10px; font-size: 16px; border: 1px solid #ccc; border-radius: 8px; }
    button { padding: 10px 16px; border: none; border-radius: 8px; background: #2563eb; color: white; cursor: pointer; }
    button:hover { background: #1d4ed8; }
    .muted { color: #666; font-size: 14px; margin-bottom: 15px; }
    #posts { margin-top: 20px; }
    .post { background: #eee; padding: 12px; margin-bottom: 10px; border-radius: 8px; }
  </style>
</head>
<body>

  <div class="box">
    <h2>بيننا</h2>

    <div class="top">
      <button onclick="login()">تسجيل الدخول</button>
      <button onclick="logout()">خروج</button>
    </div>

    <p id="user" class="muted">غير مسجل</p>

    <div class="top">
      <input id="text" placeholder="اكتب منشور" />
      <button onclick="send()">نشر</button>
    </div>

    <div id="posts"></div>
  </div>

  <script>
    var firebaseConfig = {
      apiKey: "AIzaSyA_pNFhFcOArArEmKLIiQ-pAlIVXdOM1T8",
      authDomain: "baynna-9884f.firebaseapp.com",
      projectId: "baynna-9884f",
      storageBucket: "baynna-9884f.appspot.com",
      messagingSenderId: "377002437252",
      appId: "1:377002437252:web:dc7f507818e8abace970d1"
    };

    firebase.initializeApp(firebaseConfig);

    var db = firebase.firestore();
    var auth = firebase.auth();

    function login() {
      var provider = new firebase.auth.GoogleAuthProvider();
      auth.signInWithRedirect(provider);
    }

    function logout() {
      auth.signOut().then(function() {
        document.getElementById("user").innerText = "غير مسجل";
      });
    }

    auth.getRedirectResult().catch(function(error) {
      alert(error.message);
    });

    auth.onAuthStateChanged(function(user) {
      if (user) {
        document.getElementById("user").innerText =
          "مسجل: " + (user.displayName || user.email || "مستخدم");
      } else {
        document.getElementById("user").innerText = "غير مسجل";
      }
    });

    function send() {
      var text = document.getElementById("text").value.trim();
      var user = auth.currentUser;

      if (!user) {
        alert("سجل الدخول أولاً");
        return;
      }

      if (text === "") return;

      db.collection("posts").add({
        text: text,
        name: user.displayName || user.email || "مستخدم",
        email: user.email || "",
        time: Date.now()
      }).then(function() {
        document.getElementById("text").value = "";
      });
    }

    db.collection("posts")
      .orderBy("time", "desc")
      .onSnapshot(function(snapshot) {
        var html = "";

        snapshot.forEach(function(doc) {
          var data = doc.data();
          html += "<div class='post'><strong>" +
            (data.name || "مستخدم") +
            "</strong><br>" +
            (data.text || "") +
            "</div>";
        });

        document.getElementById("posts").innerHTML = html;
      });
  </script>

</body>
</html>
