<!DOCTYPE html>
<html lang="ar">
<head>

<meta charset="UTF-8">
<title>بيننا</title>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

</head>
<body>

<h2>بيننا</h2>

<button onclick="login()">تسجيل الدخول بجوجل</button>

<br><br>

<input id="text" placeholder="اكتب منشور">
<button onclick="send()">نشر</button>

<div id="posts"></div>

<script>

var firebaseConfig = {
apiKey: "PUT_API_KEY",
authDomain: "PUT_AUTH",
projectId: "PUT_ID",
storageBucket: "PUT_BUCKET",
messagingSenderId: "PUT_MSG",
appId: "PUT_APP"
};

firebase.initializeApp(firebaseConfig);

var db = firebase.firestore();


function login(){

var provider = new firebase.auth.GoogleAuthProvider();

firebase.auth().signInWithPopup(provider);

}


function send(){

var text = document.getElementById("text").value;

firebase.auth().onAuthStateChanged(function(user){

if(user){

db.collection("posts").add({
text:text,
name:user.displayName
});

}

});

}


db.collection("posts").onSnapshot(function(snapshot){

var html="";

snapshot.forEach(function(doc){

html += "<p>"+doc.data().name+" : "+doc.data().text+"</p>";

});

document.getElementById("posts").innerHTML = html;

});

</script>

</body>
</html>
