<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>المحفوظات</title>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script src="firebaseConfig.js"></script>
</head>

<body>

<h2>المنشورات المحفوظة</h2>

<div id="savedPosts"></div>

<script>
const db = firebase.firestore();

firebase.auth().onAuthStateChanged(user => {
  if (!user) {
    alert("سجل دخول أولاً");
    return;
  }

  db.collection("users").doc(user.uid).collection("saved")
    .get()
    .then(snapshot => {

      const box = document.getElementById("savedPosts");
      box.innerHTML = "";

      snapshot.forEach(doc => {
        box.innerHTML += "<p>📌 منشور محفوظ: " + doc.id + "</p>";
      });

    });
});
</script>

</body>
</html>
